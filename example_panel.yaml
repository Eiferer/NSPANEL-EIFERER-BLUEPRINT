# ============================================================================
# Example: My NSPanel Configuration
# ============================================================================
# Copy this file into your ESPHome dashboard as a starting point.
# Change the substitutions below, uncomment the add-ons you need.
# ============================================================================

substitutions:
  # ── REQUIRED: Change these ──
  device_name: "living-room-panel"
  friendly_name: "Living Room Panel"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password

  # ── OPTIONAL: TFT display file ──
  # Use a local URL if GitHub transfers are unreliable
  nextion_update_url: "http://homeassistant.local:8123/local/nspanel_eu.tft"
  upload_tft_automatically: "true"
  boot_sound: "false"

  # ── ADD-ON CONFIG ──
  # Uncomment the relevant settings if you enable climate add-ons below
  # heater_relay: "1"          # Which relay drives the heater (1 or 2)
  # cooler_relay: "2"          # Which relay drives the cooler (1 or 2)

  # Uncomment to customize cover timing
  # cover_open_duration: "30s"
  # cover_close_duration: "30s"

  # Uncomment to customize memory thresholds
  # memory_warn_threshold: "30000"
  # memory_critical_threshold: "15000"

# ════════════════════════════════════════════
# CUSTOMIZATION AREA
# Add your overrides here — they take priority
# ════════════════════════════════════════════
##### My customization - Start #####

# Example: Encrypt API communication
# api:
#   encryption:
#     key: !secret api_encryption_key

# Example: Set timezone explicitly
# time:
#   - id: !extend time_provider
#     timezone: "Europe/Berlin"

# Example: Manual IP
# wifi:
#   networks:
#     - id: !extend wifi_default
#       manual_ip:
#         static_ip: 192.168.1.100
#         gateway: 192.168.1.1
#         subnet: 255.255.255.0

##### My customization - End #####

# ════════════════════════════════════════════
# PACKAGES — Core + Add-ons
# ════════════════════════════════════════════
packages:
  remote_package:
    url: https://github.com/YOUR_USER/nspanel-eiferer-blueprint
    ref: main
    refresh: 300s
    files:
      - eiferer_esphome.yaml                              # Core (REQUIRED)

      # ── Climate (uncomment ONE) ──
      # - esphome/addons/eiferer_addon_climate_heat.yaml  # Heating only
      # - esphome/addons/eiferer_addon_climate_cool.yaml  # Cooling only
      # - esphome/addons/eiferer_addon_climate_dual.yaml  # Heat + Cool

      # ── Other add-ons ──
      # - esphome/addons/eiferer_addon_cover.yaml         # Cover / blind control
      # - esphome/addons/eiferer_addon_display_light.yaml # Display as HA light entity
      # - esphome/addons/eiferer_addon_energy.yaml        # Energy dashboard page
      # - esphome/addons/eiferer_addon_bluetooth.yaml     # BLE proxy (⚠️ high memory)
