# ============================================================================
# Example: Bedroom Panel with Heating + Cover Control
# ============================================================================

substitutions:
  device_name: "bedroom-panel"
  friendly_name: "Bedroom Panel"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  nextion_update_url: "http://homeassistant.local:8123/local/nspanel_eu.tft"
  upload_tft_automatically: "true"

  # Climate: use relay 1 for heating
  heater_relay: "1"

  # Cover: use relay 2 for blinds
  cover_open_relay: "2"
  cover_close_relay: "2"
  cover_open_duration: "25s"
  cover_close_duration: "25s"

##### My customization - Start #####

# Encrypt API for security
api:
  encryption:
    key: !secret api_encryption_key

# Custom OTA password
ota:
  - platform: esphome
    password: !secret ota_password

# Set timezone
time:
  - id: !extend time_provider
    timezone: "Europe/Berlin"

##### My customization - End #####

packages:
  remote_package:
    url: https://github.com/YOUR_USER/nspanel-eiferer-blueprint
    ref: main
    refresh: 300s
    files:
      - eiferer_esphome.yaml
      - esphome/addons/eiferer_addon_climate_heat.yaml
      - esphome/addons/eiferer_addon_cover.yaml
      - esphome/addons/eiferer_addon_display_light.yaml
