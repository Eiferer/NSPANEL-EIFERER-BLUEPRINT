# ============================================================================
# Example: Minimal Panel — Buttons Only, No Add-ons
# ============================================================================
# Smallest possible memory footprint. Good for panels that just control
# lights and switches with no climate or cover needs.
# ============================================================================

substitutions:
  device_name: "hallway-panel"
  friendly_name: "Hallway Panel"
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  nextion_update_url: "http://homeassistant.local:8123/local/nspanel_eu.tft"
  upload_tft_automatically: "true"

packages:
  remote_package:
    url: https://github.com/YOUR_USER/nspanel-eiferer-blueprint
    ref: main
    refresh: 300s
    files:
      - eiferer_esphome.yaml  # That's it — core only
